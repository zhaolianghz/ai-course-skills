<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="100%" role="img">
  <title>AI 的三幅面孔</title>
  <desc>图书馆人、实习生、填字玩家</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="180" height="320" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="78" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="500">读过所有书</text>
  <text x="130" y="98" text-anchor="middle" fill="#888780" font-size="12">但从没出过门</text>
  <rect x="60" y="120" width="140" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="130" y="150" text-anchor="middle" fill="#0C447C" font-size="13" font-weight="500">知识面极广</text>
  <text x="130" y="170" text-anchor="middle" fill="#888780" font-size="11">读过整个互联网</text>
  <rect x="60" y="210" width="140" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="130" y="240" text-anchor="middle" fill="#0C447C" font-size="13" font-weight="500">输出极流畅</text>
  <text x="130" y="260" text-anchor="middle" fill="#888780" font-size="11">但会有事实错误</text>
  <rect x="60" y="300" width="140" height="48" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="130" y="328" text-anchor="middle" fill="#712B13" font-size="12" font-weight="500">无亲身经历</text>
  <line x1="130" y1="200" x2="130" y2="208" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="130" y1="290" x2="130" y2="298" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,3"/>
  <rect x="250" y="40" width="180" height="320" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="78" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="500">超级实习生</text>
  <text x="340" y="98" text-anchor="middle" fill="#888780" font-size="12">能干活但得盯着</text>
  <rect x="270" y="120" width="140" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="144" text-anchor="middle" fill="#27500A" font-size="13" font-weight="500">干活超快</text>
  <text x="340" y="164" text-anchor="middle" fill="#888780" font-size="11">你说需求秒出活</text>
  <rect x="270" y="190" width="140" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="214" text-anchor="middle" fill="#27500A" font-size="13" font-weight="500">知识面宽</text>
  <text x="340" y="234" text-anchor="middle" fill="#888780" font-size="11">啥话题都能聊</text>
  <rect x="270" y="260" width="140" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="284" text-anchor="middle" fill="#633806" font-size="13" font-weight="500">偶尔犯错</text>
  <text x="340" y="304" text-anchor="middle" fill="#888780" font-size="11">你得检查把关</text>
  <rect x="270" y="330" width="140" height="20" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="344" text-anchor="middle" fill="#791F1F" font-size="10">锅是你的</text>
  <rect x="460" y="40" width="180" height="320" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="550" y="78" text-anchor="middle" fill="#3C3489" font-size="14" font-weight="500">填字游戏高手</text>
  <text x="550" y="98" text-anchor="middle" fill="#888780" font-size="12">不是百度搜索</text>
  <rect x="480" y="120" width="140" height="80" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="550" y="148" text-anchor="middle" fill="#0C447C" font-size="13" font-weight="500">逐字猜测</text>
  <text x="550" y="168" text-anchor="middle" fill="#888780" font-size="11">一个字一个字猜</text>
  <text x="550" y="186" text-anchor="middle" fill="#888780" font-size="11">不是查出来的</text>
  <rect x="480" y="210" width="140" height="80" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="550" y="240" text-anchor="middle" fill="#712B13" font-size="13" font-weight="500">会胡编</text>
  <text x="550" y="260" text-anchor="middle" fill="#888780" font-size="11">猜错时说得</text>
  <text x="550" y="278" text-anchor="middle" fill="#888780" font-size="11">跟真的一样</text>
  <rect x="480" y="300" width="140" height="48" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="550" y="328" text-anchor="middle" fill="#27500A" font-size="12" font-weight="500">需要你验证</text>
  <line x1="340" y1="365" x2="340" y2="380" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="340" y1="380" x2="550" y2="380" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="550" y1="380" x2="550" y2="365" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="445" y="398" text-anchor="middle" fill="#888780" font-size="11">AI 是工具，不是神，也不是魔鬼</text>
</svg>