<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="100%" role="img">
  <title>AI 能力三色灯</title>
  <desc>绿灯放心用、黄灯核实用、红灯自己来</desc>
  <rect x="40" y="40" width="185" height="420" rx="14" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <circle cx="132" cy="78" r="16" fill="#639922"/>
  <text x="132" y="84" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">绿</text>
  <text x="132" y="115" text-anchor="middle" fill="#27500A" font-size="14" font-weight="500">放心交给它</text>
  <rect x="55" y="140" width="155" height="42" rx="6" fill="#fff" stroke="#97C459" stroke-width="0.5"/>
  <text x="132" y="166" text-anchor="middle" fill="#27500A" font-size="12">写初稿</text>
  <rect x="55" y="190" width="155" height="42" rx="6" fill="#fff" stroke="#97C459" stroke-width="0.5"/>
  <text x="132" y="216" text-anchor="middle" fill="#27500A" font-size="12">做总结</text>
  <rect x="55" y="240" width="155" height="42" rx="6" fill="#fff" stroke="#97C459" stroke-width="0.5"/>
  <text x="132" y="266" text-anchor="middle" fill="#27500A" font-size="12">翻译</text>
  <rect x="55" y="290" width="155" height="42" rx="6" fill="#fff" stroke="#97C459" stroke-width="0.5"/>
  <text x="132" y="316" text-anchor="middle" fill="#27500A" font-size="12">整理信息</text>
  <rect x="55" y="340" width="155" height="42" rx="6" fill="#fff" stroke="#97C459" stroke-width="0.5"/>
  <text x="132" y="366" text-anchor="middle" fill="#27500A" font-size="12">找灵感</text>
  <text x="132" y="410" text-anchor="middle" fill="#639922" font-size="11">只管扔给它</text>
  <text x="132" y="428" text-anchor="middle" fill="#639922" font-size="11">你改改就发</text>
  <rect x="248" y="40" width="185" height="420" rx="14" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <circle cx="340" cy="78" r="16" fill="#EF9F27"/>
  <text x="340" y="84" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">黄</text>
  <text x="340" y="115" text-anchor="middle" fill="#633806" font-size="14" font-weight="500">核对再用</text>
  <rect x="263" y="140" width="155" height="42" rx="6" fill="#fff" stroke="#FAC775" stroke-width="0.5"/>
  <text x="340" y="166" text-anchor="middle" fill="#633806" font-size="12">问事实数据</text>
  <rect x="263" y="190" width="155" height="42" rx="6" fill="#fff" stroke="#FAC775" stroke-width="0.5"/>
  <text x="340" y="216" text-anchor="middle" fill="#633806" font-size="12">要分析建议</text>
  <rect x="263" y="240" width="155" height="42" rx="6" fill="#fff" stroke="#FAC775" stroke-width="0.5"/>
  <text x="340" y="266" text-anchor="middle" fill="#633806" font-size="12">写专业内容</text>
  <rect x="263" y="310" width="155" height="60" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="4,2"/>
  <text x="340" y="334" text-anchor="middle" fill="#A32D2D" font-size="11">它会编一个</text>
  <text x="340" y="352" text-anchor="middle" fill="#A32D2D" font-size="11">看起来最像的答案</text>
  <text x="340" y="410" text-anchor="middle" fill="#EF9F27" font-size="11">让AI先出活</text>
  <text x="340" y="428" text-anchor="middle" fill="#EF9F27" font-size="11">你自己核实一遍</text>
  <rect x="455" y="40" width="185" height="420" rx="14" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <circle cx="548" cy="78" r="16" fill="#E24B4A"/>
  <text x="548" y="84" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">红</text>
  <text x="548" y="115" text-anchor="middle" fill="#791F1F" font-size="14" font-weight="500">别让它做</text>
  <rect x="470" y="140" width="155" height="42" rx="6" fill="#fff" stroke="#F09595" stroke-width="0.5"/>
  <text x="548" y="166" text-anchor="middle" fill="#791F1F" font-size="12">替你拍板决定</text>
  <rect x="470" y="190" width="155" height="42" rx="6" fill="#fff" stroke="#F09595" stroke-width="0.5"/>
  <text x="548" y="216" text-anchor="middle" fill="#791F1F" font-size="12">聊实时新闻</text>
  <rect x="470" y="240" width="155" height="42" rx="6" fill="#fff" stroke="#F09595" stroke-width="0.5"/>
  <text x="548" y="266" text-anchor="middle" fill="#791F1F" font-size="12">凭直觉判断</text>
  <rect x="470" y="310" width="155" height="60" rx="6" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5" stroke-dasharray="4,2"/>
  <text x="548" y="334" text-anchor="middle" fill="#27500A" font-size="11">需要人的责任</text>
  <text x="548" y="352" text-anchor="middle" fill="#27500A" font-size="11">经验和价值观</text>
  <text x="548" y="410" text-anchor="middle" fill="#A32D2D" font-size="11">你的判断力</text>
  <text x="548" y="428" text-anchor="middle" fill="#A32D2D" font-size="11">才是最后防线</text>
  <text x="340" y="490" text-anchor="middle" fill="#888780" font-size="12">记不住？截个图设成桌面</text>
</svg>